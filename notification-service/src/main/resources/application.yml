server:
  port: 8085

spring:
  application:
    name: notification-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
    template:
      retry:
        enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/xwz_parking
    username: ${DB_USERNAME:xwz}
    password: ${DB_PASSWORD:xwz_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  # Mail (set enabled: true and configure SMTP to send real emails)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@xwzparking.rw}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

notification:
  mail:
    enabled: false   # Set to true + configure SMTP to send real emails
    from: ${NOTIFICATION_MAIL_FROM:noreply@xwzparking.rw}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.amnii.parking: DEBUG
    org.springframework.amqp: INFO
